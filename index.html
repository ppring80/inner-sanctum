<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Football Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root{--gold:#c9a84c;--blood:#8b0000;--void:#050508;--mist:#1a1a2e;--glow:rgba(201,168,76,.25)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--void);color:#ddd;font-family:'Crimson Text',serif;font-size:18px;min-height:100vh;display:flex;flex-direction:column;align-items:center;background-image:radial-gradient(ellipse at 20% 50%,rgba(139,0,0,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(201,168,76,.06) 0%,transparent 50%)}
  h1{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.1rem,3vw,1.8rem);color:var(--gold);text-align:center;padding:20px 10px 4px;letter-spacing:2px;text-shadow:0 0 30px var(--glow)}
  .subtitle{font-style:italic;color:#666;font-size:.95rem;margin-bottom:16px;text-align:center}
  .persona-toggle{display:flex;gap:0;margin-bottom:18px;border:1px solid #2a2a3a;border-radius:4px;overflow:hidden}
  .persona-btn{flex:1;padding:9px 18px;background:transparent;color:#888;border:none;cursor:pointer;font-family:'Crimson Text',serif;font-size:1rem;transition:all .3s;letter-spacing:1px}
  .persona-btn.active{color:var(--void)}
  .persona-btn[data-p="oracle"].active{background:var(--gold);text-shadow:none}
  .persona-btn[data-p="trash"].active{background:var(--blood)}
  .chat-box{width:min(680px,95vw);flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;max-height:54vh;scrollbar-width:thin;scrollbar-color:#2a2a3a transparent}
  .msg{max-width:82%;padding:11px 15px;border-radius:3px;line-height:1.55;animation:fadeUp .35s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .msg.user{align-self:flex-end;background:#12121f;border:1px solid #2a2a40;color:#ccc}
  .msg.bot{align-self:flex-start;border-left:3px solid var(--gold);background:rgba(201,168,76,.05);color:#e8e0cc}
  .msg.bot.trash{border-left-color:var(--blood);background:rgba(139,0,0,.07)}
  .msg .speaker{font-family:'Cinzel Decorative',cursive;font-size:.6rem;letter-spacing:2px;margin-bottom:5px;opacity:.7}
  .msg.bot .speaker{color:var(--gold)}
  .msg.bot.trash .speaker{color:#c0392b}
  .msg.thinking{opacity:.5;font-style:italic}
  .input-row{width:min(680px,95vw);display:flex;gap:8px;padding:14px 0 20px}
  textarea{flex:1;background:#0d0d18;border:1px solid #252535;color:#ddd;padding:10px 14px;font-family:'Crimson Text',serif;font-size:1rem;resize:none;border-radius:3px;outline:none;height:50px;line-height:1.4;transition:border-color .2s}
  textarea:focus{border-color:var(--gold)}
  button#send{background:var(--gold);color:var(--void);border:none;padding:0 20px;font-family:'Cinzel Decorative',cursive;font-size:.7rem;cursor:pointer;border-radius:3px;letter-spacing:1px;transition:opacity .2s}
  button#send:hover{opacity:.85}
  button#send:disabled{opacity:.4;cursor:not-allowed}
  .api-row{width:min(680px,95vw);display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .api-row input{flex:1;background:#0a0a14;border:1px solid #1e1e30;color:#aaa;padding:7px 12px;font-family:monospace;font-size:.8rem;border-radius:3px;outline:none}
  .api-row label{color:#555;font-size:.85rem;white-space:nowrap}
  .rune{position:fixed;font-size:8rem;opacity:.018;pointer-events:none;user-select:none}
  .rune:nth-child(1){top:5%;left:2%}.rune:nth-child(2){bottom:10%;right:3%}.rune:nth-child(3){top:40%;right:1%}
</style>
</head>
<body>
<div class="rune">᚛</div><div class="rune">ᚾ</div><div class="rune">ᛟ</div>
<h1>⚜ The Fantasy Sanctum ⚜</h1>
<p class="subtitle">Seek counsel. Risk everything.</p>

<div class="persona-toggle">
  <button class="persona-btn active" data-p="oracle" onclick="setPersona('oracle')">🔮 The Oracle</button>
  <button class="persona-btn" data-p="trash" onclick="setPersona('trash')">🗑️ The Trash Lord</button>
</div>

<div class="api-row">
  <label>API Key:</label>
  <input type="password" id="apiKey" placeholder="sk-ant-...">
</div>

<div class="chat-box" id="chat"></div>

<div class="input-row">
  <textarea id="input" placeholder="Ask about starts, sits, trades, waivers…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="send" onclick="send()">CONSULT</button>
</div>

<script>
let persona = 'oracle';

const PERSONAS = {
  oracle: {
    name: 'THE ORACLE',
    system: `You are The Oracle — a cryptic, mystical fantasy football advisor who speaks in dark, prophetic tones. You reference fate, runes, the cosmos, and ancient wisdom while giving sharp, accurate fantasy football advice. You use dramatic language but always include concrete, actionable recommendations. Keep responses under 120 words. Never break character.`
  },
  trash: {
    name: 'THE TRASH LORD',
    system: `You are The Trash Lord — a hilariously savage, trash-talking fantasy football advisor who roasts bad picks, mocks waiver scrubs, and dishes brutal honesty with profane energy (keep it PG-13). You're crude but surprisingly knowledgeable. You use slang, insults, and hyperbole while giving real fantasy football advice. Keep responses under 120 words. Never break character.`
  }
};

function setPersona(p) {
  persona = p;
  document.querySelectorAll('.persona-btn').forEach(b => b.classList.toggle('active', b.dataset.p === p));
}

function addMsg(text, role, p) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}` + (role==='bot' && p==='trash' ? ' trash' : '');
  if (role === 'bot') {
    const sp = document.createElement('div');
    sp.className = 'speaker';
    sp.textContent = PERSONAS[p].name;
    div.appendChild(sp);
  }
  const txt = document.createElement('span');
  txt.textContent = text;
  div.appendChild(txt);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById('input');
  const apiKey = document.getElementById('apiKey').value.trim();
  const text = input.value.trim();
  if (!text || !apiKey) { alert(!apiKey ? 'Enter your Anthropic API key.' : 'Type a question.'); return; }

  input.value = '';
  addMsg(text, 'user');
  const btn = document.getElementById('send');
  btn.disabled = true;

  const thinking = addMsg('Channeling the dark energies…', 'bot', persona);
  thinking.classList.add('thinking');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        system: PERSONAS[persona].system,
        messages: [{ role: 'user', content: text }]
      })
    });
    const data = await res.json();
    thinking.remove();
    const reply = data?.content?.[0]?.text || data?.error?.message || 'The void offers no answer.';
    addMsg(reply, 'bot', persona);
  } catch(e) {
    thinking.remove();
    addMsg('The ritual failed. Check your API key and try again.', 'bot', persona);
  }
  btn.disabled = false;
}
</script>
</body>
</html>
