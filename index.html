
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Inner Sanctum</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; background: linear-gradient(160deg, #1e1410 0%, #261a14 50%, #2a1520 100%);
.wrap { width: 100%; max-width: 660px; display: flex; flex-direction: column; height: 100vh; }
.top { padding: 20px 20px 0; text-align: center; }
.top p { font-size: 10px; letter-spacing: 5px; color: #c9a84c; text-transform: uppercase; margin-bottom: 6px; }
.top h1 { font-size: 26px; color: #e8d5a3; margin-bottom: 4px; }
.top small { font-size: 10px; letter-spacing: 3px; color: #444; text-transform: uppercase; display: block; margin-bottom: 16px; }
.tabs { display: flex; gap: 10px; padding: 0 20px; margin-bottom: 4px; }
.tab { flex: 1; padding: 10px 14px; border-radius: 10px; border: 2px solid #1a1a1a; background: #0e0e0e; color: #444; cursor: pointer; text-align: left; font-family: Georgia, serif; }
.tab.on-oracle { border-color: #c9a84c; background: rgba(201,168,76,0.08); color: #c9a84c; }
.tab.on-trash { border-color: #ff4444; background: rgba(255,68,68,0.08); color: #ff4444; }
.tab-icon { font-size: 20px; margin-bottom: 2px; }
.tab-name { font-size: 13px; font-weight: bold; }
.tab-sub { font-size: 10px; opacity: 0.6; }
.msgs { flex: 1; overflow-y: auto; padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; }
.greet { display: flex; gap: 8px; align-items: flex-start; }
.av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.av-oracle { background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4); }
.av-trash { background: rgba(255,68,68,0.15); border: 1px solid rgba(255,68,68,0.4); }
.greet-txt { background: #0e0e0e; border-radius: 4px 12px 12px 12px; padding: 10px 14px; font-style: italic; font-size: 14px; line-height: 1.6; color: rgba(240,230,204,0.7); max-width: 85%; }
.greet-txt.oracle { border: 1px solid rgba(201,168,76,0.2); }
.greet-txt.trash { border: 1px solid rgba(255,68,68,0.2); }
.suggs { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
.sugg { background: transparent; border: 1px solid #1a1a1a; border-radius: 7px; padding: 7px 12px; color: #444; font-size: 13px; font-family: Georgia, serif; text-align: left; cursor: pointer; }
.sugg:hover { border-color: rgba(201,168,76,0.3); color: #888; }
.msg { display: flex; gap: 8px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.bub { max-width: 80%; padding: 10px 14px; font-size: 14px; line-height: 1.6; border-radius: 4px 12px 12px 12px; }
.bub.bot { background: #0e0e0e; border: 1px solid #1a1a1a; color: #ccc; }
.bub.u-oracle { background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.25); color: #e0d0a0; border-radius: 12px 4px 12px 12px; }
.bub.u-trash { background: rgba(255,68,68,0.12); border: 1px solid rgba(255,68,68,0.25); color: #ffaaaa; border-radius: 12px 4px 12px 12px; }
.dots { display: flex; gap: 4px; align-items: center; padding: 12px 16px; background: #0e0e0e; border: 1px solid #1a1a1a; border-radius: 4px 12px 12px 12px; }
.dot { width: 5px; height: 5px; border-radius: 50%; animation: db 1.2s infinite; }
.dot-oracle { background: #c9a84c; }
.dot-trash { background: #ff4444; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
.bot-area { padding: 10px 20px 24px; border-top: 1px solid #111; }
.inp-box { display: flex; gap: 8px; align-items: flex-end; background: #0a0a0a; border-radius: 12px; padding: 8px 10px; }
.inp-box.oracle { border: 1px solid rgba(201,168,76,0.3); }
.inp-box.trash { border: 1px solid rgba(255,68,68,0.3); }
textarea { flex: 1; background: transparent; border: none; color: #ddd; font-size: 14px; font-family: Georgia, serif; padding: 2px 4px; resize: none; max-height: 80px; }
textarea:focus { outline: none; }
.send { width: 32px; height: 32px; border-radius: 8px; border: none; font-size: 15px; font-weight: bold; cursor: pointer; flex-shrink: 0; }
.send.oracle { background: linear-gradient(135deg, #c9a84c, #8b6914); color: #000; }
.send.trash { background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff; }
.foot { text-align: center; font-size: 9px; letter-spacing: 2px; color: #1a1a1a; margin-top: 6px; text-transform: uppercase; }
@keyframes db { 0%,100%{opacity:.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-3px)} }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <p>Fantasy Football AI</p>
    <h1>The Inner Sanctum</h1>
    <small>Choose your counsel wisely</small>
  </div>
  <div class="tabs">
    <button class="tab on-oracle" id="t-oracle" onclick="go('oracle')">
      <div class="tab-icon">🔮</div>
      <div class="tab-name">The Oracle</div>
      <div class="tab-sub">38 Seasons of Wisdom</div>
    </button>
    <button class="tab" id="t-trash" onclick="go('trash')">
      <div class="tab-icon">🔥</div>
      <div class="tab-name">The Trash Lord</div>
      <div class="tab-sub">Certified League Villain</div>
    </button>
  </div>
  <div style="text-align:center; margin: 4px 0;">
  <button id="voiceBtn" onclick="toggleVoice()" style="background:transparent; border:1px solid #1a1a1a; border-radius:8px; color:#444; font-size:11px; padding:5px 14px; cursor:pointer; font-family:Georgia,serif;">
    🔊 Voice On
  </button>
</div>
  <div class="msgs" id="msgs">
    <div class="greet">
      <div class="av av-oracle" id="gav">🔮</div>
      <div class="greet-txt oracle" id="gtxt">I have watched 38 seasons come and go, witnessed dynasties rise and fall. Ask, and I shall illuminate your path to fantasy glory.</div>
    </div>
    <div id="suggs" class="suggs">
      <button class="sugg" onclick="ask('Should I start or sit my RB this week?')">Should I start or sit my RB this week?</button>
      <button class="sugg" onclick="ask('Help me decide on a trade')">Help me decide on a trade</button>
      <button class="sugg" onclick="ask('Who should I pick up on waivers?')">Who should I pick up on waivers?</button>
      <button class="sugg" onclick="ask('Rate my team chances this season')">Rate my team chances this season</button>
      <button class="sugg" onclick="ask('Give me a hot take on my roster')">Give me a hot take on my roster</button>
    </div>
  </div>
  <div class="bot-area">
    <div class="inp-box oracle" id="ibox">
      <textarea id="inp" rows="1" placeholder="Ask the Oracle for wisdom..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ask()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
      <button class="send oracle" id="sbtn" onclick="ask()">↑</button>
    </div>
    <div class="foot">The Inner Sanctum - Fantasy AI - Est. 1987</div>
  </div>
</div>
<script>
var K = "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";
var P = {
  oracle: { sys: "You are The Oracle, a wise fantasy football sage with 38 years of experience. Speak with gravitas. Reference legends like Jerry Rice and Barry Sanders. Use mystical language. Give concrete fantasy football advice in 3-5 sentences.", greet: "I have watched 38 seasons come and go, witnessed dynasties rise and fall. Ask, and I shall illuminate your path to fantasy glory.", ph: "Ask the Oracle for wisdom...", em: "🔮" },
  trash: { sys: "You are The Trash Lord, the ultimate fantasy football trash talker. Be snarky, hilarious, savage but never mean. Use ALL CAPS for emphasis. Give real fantasy advice in 3-5 sentences.", greet: "Oh you actually showed up? Bold move from someone who probably started a bye week player last week. Let us hear your sad little fantasy problem.", ph: "Brace yourself for the truth...", em: "🔥" }
};
var ap = "oracle";
var hist = { oracle: [], trash: [] };
var busy = false;
var voiceOn = true;
function go(p) {
  ap = p;
  document.getElementById("t-oracle").className = "tab" + (p === "oracle" ? " on-oracle" : "");
  document.getElementById("t-trash").className = "tab" + (p === "trash" ? " on-trash" : "");
  document.getElementById("ibox").className = "inp-box " + p;
  document.getElementById("sbtn").className = "send " + p;
  document.getElementById("inp").placeholder = P[p].ph;
  document.getElementById("gav").textContent = P[p].em;
  document.getElementById("gav").className = "av av-" + p;
  document.getElementById("gtxt").textContent = P[p].greet;
  document.getElementById("gtxt").className = "greet-txt " + p;
  draw();
}
function draw() {
  var m = document.getElementById("msgs");
  var h = hist[ap];
  document.getElementById("suggs").style.display = h.length > 0 ? "none" : "flex";
  var old = m.querySelectorAll(".msg");
  for (var i = 0; i < old.length; i++) { old[i].remove(); }
  var ld = document.getElementById("ld");
  if (ld) { ld.remove(); }
  for (var j = 0; j < h.length; j++) {
    var d = document.createElement("div");
    d.className = "msg " + h[j].role;
    if (h[j].role === "assistant") {
      d.innerHTML = '<div class="av av-' + ap + '">' + P[ap].em + '</div><div class="bub bot">' + h[j].content + '</div>';
    } else {
      d.innerHTML = '<div class="bub u-' + ap + '">' + h[j].content + '</div>';
    }
    m.appendChild(d);
  }
  if (busy) {
    var ld2 = document.createElement("div");
    ld2.className = "msg assistant";
    ld2.id = "ld";
    ld2.innerHTML = '<div class="av av-' + ap + '">' + P[ap].em + '</div><div class="dots"><div class="dot dot-' + ap + '"></div><div class="dot dot-' + ap + '"></div><div class="dot dot-' + ap + '"></div></div>';
    m.appendChild(ld2);
  }
  m.scrollTop = m.scrollHeight;
}
function ask(txt) {
  var inp = document.getElementById("inp");
  var q = txt || inp.value.trim();
  if (!q || busy) { return; }
  inp.value = "";
  inp.style.height = "auto";
  busy = true;
  hist[ap].push({ role: "user", content: q });
  draw();
  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/.netlify/functions/chat");
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.setRequestHeader("x-api-key", K);
  xhr.setRequestHeader("anthropic-version", "2023-06-01");
 xhr.onload = function() {
    var reply = "The spirits are silent. Try again.";
    try {
      var data = JSON.parse(xhr.responseText);
      if (data && data.content && data.content[0]) { reply = data.content[0].text; }
    } catch(e) { reply = "Parse error: " + e.message; }
    hist[ap].push({ role: "assistant", content: reply });
    busy = false;
    draw();
    if (voiceOn) {
      window.speechSynthesis.cancel();
      var utterance = new SpeechSynthesisUtterance(reply);
      if (ap === "oracle") {
        utterance.rate = 0.8;
        utterance.pitch = 0.6;
        utterance.volume = 1;
      } else {
        utterance.rate = 1.3;
        utterance.pitch = 1.4;
        utterance.volume = 1;
      }
      window.speechSynthesis.speak(utterance);
    }
  };
  };
  xhr.onerror = function() {
    hist[ap].push({ role: "assistant", content: "Connection lost. Try again." });
    var utterance = new SpeechSynthesisUtterance(reply);
if (ap === "oracle") {
  utterance.rate = 0.8;
  utterance.pitch = 0.6;
  utterance.volume = 1;
} else {
  utterance.rate = 1.3;
  utterance.pitch = 1.4;
  utterance.volume = 1;
}
window.speechSynthesis.speak(utterance);
    busy = false;
    draw();
  };
  xhr.send(JSON.stringify({ model: "claude-sonnet-4-5", max_tokens: 1000, system: P[ap].sys, messages: hist[ap] }));
}
function toggleVoice() {
  voiceOn = !voiceOn;
  window.speechSynthesis.cancel();
  var btn = document.getElementById("voiceBtn");
  btn.textContent = voiceOn ? "🔊 Voice On" : "🔇 Voice Off";
  btn.style.color = voiceOn ? "#c9a84c" : "#444";
  btn.style.borderColor = voiceOn ? "rgba(201,168,76,0.3)" : "#1a1a1a";
}
var voiceOn = true;
  
</script>
</body>
</html>
