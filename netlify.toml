[build]
  publish = "."
  functions = "netlify/functions"
[context.production]
  environment = { SECRETS_SCAN_ENABLED = "false" }
[[redirects]]
  from = "/landing"
  to = "/"
  status = 308
[[redirects]]
  from = "/landing.html"
  to = "/"
  status = 308
[[redirects]]
  from = "/home.html"
  to = "/"
  status = 308
[[redirects]]
  from = "/sanctum.html"
  to = "/sanctum"
  status = 308

# PATREON OAUTH CALLBACK REDIRECT (added)
# PATREON_REDIRECT_URI (Netlify env var, and the redirect URI
# registered in Patreon's own developer app settings) points at
# https://theinnersanctum.xyz/oauth/callback -- a friendly path that
# doesn't correspond to any real file or page. This rule is what
# makes that path actually work: it quietly proxies to the real
# Netlify Function at /.netlify/functions/oauth-callback, which does
# the actual token exchange and sets the session cookie.
#
# Without this rule, Patreon would redirect a real logged-in user
# back to a URL that 404s -- the OAuth flow would complete on
# Patreon's side (the user really did authorize and really did get a
# code), but the site would never receive or use that code, so no
# session would ever get created. Discovered missing 2026-06-27 while
# debugging why a real test subscription's login never unlocked
# anything -- this redirect rule's absence was the root cause, not
# anything wrong with oauth-callback.js itself.
#
# status = 200 (a rewrite/proxy), NOT a 3xx redirect -- the browser's
# address bar should keep showing /oauth/callback (matching exactly
# what's registered with Patreon) while Netlify serves the function's
# response from underneath, rather than visibly bouncing the user to
# a different-looking URL.
[[redirects]]
  from = "/oauth/callback"
  to = "/.netlify/functions/oauth-callback"
  status = 200

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Content-Type = "image/svg+xml"

# CACHE CONTROL (added)
# Added after a real bug: rapid back-to-back testing of weekly.html
# served a stale cached copy with old "Ask [Persona]" links pointing
# at the wrong player, even after the page had been updated. A hard
# reload fixed it that time, but a real customer wouldn't know to do
# that. These rules tell the browser to always re-validate with the
# server before using a cached copy of these pages, rather than
# trusting an old copy silently. Applied to all the dynamic, frequently
# iterated app pages (not just weekly.html, which caused the actual
# incident) since auction.html/tiers.html/sanctum.html share the same
# theoretical exposure to this failure mode even though it hasn't
# been observed on those specifically. Static assets (favicon, CSS via
# CDN, etc.) are NOT covered here and don't need to be -- this is only
# for pages whose content changes between deploys and where a stale
# copy could mislead a user, the same risk this bug demonstrated.
[[headers]]
  for = "/weekly"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
[[headers]]
  for = "/sanctum"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
[[headers]]
  for = "/auction"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
[[headers]]
  for = "/tiers"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
