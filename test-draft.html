<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inner Sanctum — Draft Command Center Tests</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a0f08;--bg2:#221208;--surface:rgba(0,0,0,0.4);
  --gold:#c9a84c;--green:#4caf50;--red:#ff5252;--amber:#ff9800;--blue:#64b5f6;
  --text:#f0e0b0;--text-dim:#7a6a3a;--text-muted:#4a3a22;--r:8px;
}
body{background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 40%,#261018 100%);color:var(--text);font-family:'Lora',Georgia,serif;font-size:15px;line-height:1.6;min-height:100vh;padding:24px 20px 60px;}
.wrap{max-width:900px;margin:0 auto;}
.hdr{text-align:center;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid rgba(201,168,76,0.2);}
.hdr-badge{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;display:block;}
.hdr h1{font-family:'Cinzel',serif;font-size:28px;font-weight:600;color:#f0e6cc;margin-bottom:6px;}
.hdr-sub{font-size:12px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.score-card{background:var(--surface);border:1px solid rgba(201,168,76,0.2);border-radius:var(--r);padding:14px;text-align:center;}
.score-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;}
.score-val{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600;color:var(--gold);}
.controls{background:var(--surface);border:1px solid rgba(201,168,76,0.2);border-radius:var(--r);padding:18px;margin-bottom:24px;}
.controls-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.btn{padding:10px 20px;border-radius:var(--r);border:none;font-family:'Lora',serif;font-size:13px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-gold{background:linear-gradient(135deg,#c9a84c,#8b6914);color:#000;font-weight:600;}
.btn-gold:hover{opacity:0.88;transform:translateY(-1px);}
.btn-gold:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--text-dim);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.progress-wrap{margin-bottom:24px;display:none;}
.progress-track{background:rgba(0,0,0,0.4);border-radius:4px;height:8px;overflow:hidden;margin-bottom:6px;}
.progress-fill{height:100%;background:var(--gold);border-radius:4px;transition:width 0.4s;}
.progress-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
.section-header{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,0.15);}
.test-card{background:var(--surface);border:1px solid rgba(255,255,255,0.07);border-radius:var(--r);padding:16px;margin-bottom:8px;}
.test-card.pass{border-color:rgba(76,175,80,0.3);}
.test-card.fail{border-color:rgba(255,82,82,0.3);}
.test-card.warn{border-color:rgba(255,152,0,0.3);}
.test-card.running{border-color:rgba(100,181,246,0.3);}
.test-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.test-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);min-width:28px;}
.pill{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:20px;letter-spacing:1px;}
.pill-cat{background:rgba(255,255,255,0.05);color:var(--text-dim);border:1px solid rgba(255,255,255,0.1);}
.pill-pass{background:rgba(76,175,80,0.12);color:var(--green);border:1px solid rgba(76,175,80,0.3);}
.pill-fail{background:rgba(255,82,82,0.12);color:var(--red);border:1px solid rgba(255,82,82,0.3);}
.pill-warn{background:rgba(255,152,0,0.12);color:var(--amber);border:1px solid rgba(255,152,0,0.3);}
.pill-running{background:rgba(100,181,246,0.12);color:var(--blue);border:1px solid rgba(100,181,246,0.3);}
.pill-pending{background:rgba(255,255,255,0.05);color:var(--text-dim);border:1px solid rgba(255,255,255,0.1);}
.test-name{font-size:14px;color:#e0d0b0;font-weight:600;margin-bottom:6px;}
.test-detail{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);line-height:1.6;}
.test-detail.error{color:var(--red);}
.test-detail.success{color:var(--green);}
.test-detail.warning{color:var(--amber);}
.summary{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.25);border-radius:var(--r);padding:18px;margin-bottom:24px;display:none;}
.summary-title{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);margin-bottom:12px;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
.summary-item strong{color:var(--text);display:block;}
.summary-item{font-size:13px;color:var(--text-dim);}
.foot{text-align:center;margin-top:40px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <span class="hdr-badge">Pringle AI LLC · Internal Tool</span>
    <h1>📋 Draft Command Center</h1>
    <div class="hdr-sub">Automated Test Suite · Data, Logic & API Validation</div>
  </div>

  <div class="score-grid">
    <div class="score-card"><div class="score-label">Passed</div><div class="score-val" id="stat-pass" style="color:var(--green)">0</div></div>
    <div class="score-card"><div class="score-label">Warned</div><div class="score-val" id="stat-warn" style="color:var(--amber)">0</div></div>
    <div class="score-card"><div class="score-label">Failed</div><div class="score-val" id="stat-fail" style="color:var(--red)">0</div></div>
    <div class="score-card"><div class="score-label">Score</div><div class="score-val" id="stat-score">—</div></div>
  </div>

  <div class="controls">
    <div class="controls-row">
      <button class="btn btn-gold" id="run-btn" onclick="runAllTests()">▶ Run All Tests</button>
      <button class="btn btn-outline" onclick="resetTests()">✕ Reset</button>
      <button class="btn btn-outline" onclick="exportReport()">⬇ Export Report</button>
    </div>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0% complete</div>
  </div>

  <div class="summary" id="summary">
    <div class="summary-title">📋 Test Run Summary</div>
    <div class="summary-grid" id="summary-grid"></div>
  </div>

  <div id="results-list"></div>

  <div class="foot">The Inner Sanctum · Pringle AI LLC · Draft Command Center Test Suite</div>
</div>

<script>
// ═══════════════════════════════════════
// DRAFT LOGIC (mirrors draft.html)
// ═══════════════════════════════════════

// 2026 bye weeks — update when NFL schedule releases
var BYE_2026 = {
  ARI:9, ATL:11, BAL:14, BUF:12, CAR:11, CHI:7, CIN:12, CLE:10,
  DAL:7, DEN:9, DET:14, GB:13, HOU:10, IND:8, JAX:11, KC:6,
  LAC:9, LAR:10, LV:13, MIA:6, MIN:14, NE:10, NO:12, NYG:8,
  NYJ:7, PHI:5, PIT:9, SEA:11, SF:9, TB:8, TEN:7, WAS:12
};

var POSITIONS = ['QB','RB','WR','TE','K','DST'];

// Tier break logic
function assignTiers(players, position) {
  if (!players || !players.length) return [];
  var sorted = players.slice().sort(function(a,b){ return (a.adp||999) - (b.adp||999); });
  var tiers = [];
  var tierSize = position === 'QB' ? 4 : position === 'TE' ? 5 : 8;
  sorted.forEach(function(p, i) {
    p.tier = Math.floor(i / tierSize) + 1;
    tiers.push(p);
  });
  return tiers;
}

// Mock player data for testing
function getMockPlayers(position, count) {
  var players = [];
  for (var i = 0; i < count; i++) {
    players.push({
      name: position + '_Player_' + (i+1),
      position: position,
      team: Object.keys(BYE_2026)[i % 32],
      adp: i + 1 + (POSITIONS.indexOf(position) * count),
      injuryStatus: i < 3 ? ['OUT','QUESTIONABLE','IR'][i] : null
    });
  }
  return players;
}

// Streamability score logic
function getStreamScore(player) {
  if (!player) return 0;
  var score = 50;
  var bye = BYE_2026[player.team];
  if (bye && bye <= 6) score += 20;
  if (player.injuryStatus === 'OUT') score -= 30;
  if (player.injuryStatus === 'QUESTIONABLE') score -= 10;
  return Math.max(0, Math.min(100, score));
}

// ADP rank logic
function getADPRank(players) {
  return players.slice().sort(function(a,b){ return (a.adp||999) - (b.adp||999); });
}

// ═══════════════════════════════════════
// TESTS
// ═══════════════════════════════════════
var TESTS = [

  // SLEEPER API TESTS
  {id:1, category:'Sleeper API', name:'Sleeper player API is reachable',
    async: true,
    fn: async function() {
      var res = await fetch('https://api.sleeper.app/v1/players/nfl');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      var count = Object.keys(data).length;
      if (count < 1000) throw new Error('Only '+count+' players returned — expected 1000+');
      return count.toLocaleString()+' players loaded from Sleeper ✓';
    }},
  {id:2, category:'Sleeper API', name:'Sleeper returns 2026 active NFL players',
    async: true,
    fn: async function() {
      var res = await fetch('https://api.sleeper.app/v1/players/nfl');
      var data = await res.json();
      var active = Object.values(data).filter(function(p){ return p.active && p.position && ['QB','RB','WR','TE','K'].includes(p.position); });
      if (active.length < 200) throw new Error('Only '+active.length+' active skill players');
      var qbs = active.filter(function(p){ return p.position==='QB'; });
      var rbs = active.filter(function(p){ return p.position==='RB'; });
      var wrs = active.filter(function(p){ return p.position==='WR'; });
      return 'Active: '+active.length+' players | QB:'+qbs.length+' RB:'+rbs.length+' WR:'+wrs.length+' ✓';
    }},
  {id:3, category:'Sleeper API', name:'Key 2026 players present in Sleeper database',
    async: true,
    fn: async function() {
      var res = await fetch('https://api.sleeper.app/v1/players/nfl');
      var data = await res.json();
      var names = Object.values(data).map(function(p){ return p.full_name || ''; });
      var keyPlayers = ['Josh Allen','Lamar Jackson','CeeDee Lamb','Ja\'Marr Chase','Christian McCaffrey'];
      var missing = keyPlayers.filter(function(n){ return !names.includes(n); });
      if (missing.length) throw new Error('Missing: '+missing.join(', '));
      return 'All key players found: '+keyPlayers.slice(0,3).join(', ')+' ✓';
    }},
  {id:4, category:'Sleeper API', name:'Sleeper injury statuses are present',
    async: true,
    fn: async function() {
      var res = await fetch('https://api.sleeper.app/v1/players/nfl');
      var data = await res.json();
      var injured = Object.values(data).filter(function(p){ return p.injury_status && p.injury_status !== null; });
      return injured.length+' players with injury status in database ✓';
    }},

  // ADP DATA TESTS
  {id:5, category:'ADP Data', name:'FFC ADP endpoint is reachable (CORS check)',
    async: true,
    warn: true,
    fn: async function() {
      try {
        var res = await fetch('https://fantasyfootballcalculator.com/api/v1/adp/standard?teams=12&year=2026', {mode:'cors'});
        if (!res.ok) throw new Error('HTTP '+res.status);
        var data = await res.json();
        var count = data.players ? data.players.length : 0;
        return 'FFC ADP live: '+count+' players ✓';
      } catch(e) {
        throw new Error('CORS blocked or unavailable — fallback data will be used. Fix before launch.');
      }
    }},
  {id:6, category:'ADP Data', name:'ADP year parameter is set to 2026',
    async: false,
    fn: function() {
      // Simulate what draft.html does
      var year = 2026;
      var url = 'https://fantasyfootballcalculator.com/api/v1/adp/standard?teams=12&year='+year;
      if (!url.includes('year=2026')) throw new Error('Year param is not 2026 in URL: '+url);
      return 'ADP URL contains year=2026 ✓';
    }},
  {id:7, category:'ADP Data', name:'Bye week data covers all 32 NFL teams',
    async: false,
    fn: function() {
      var teams = Object.keys(BYE_2026);
      if (teams.length !== 32) throw new Error('BYE object has '+teams.length+' teams, expected 32');
      var invalidWeeks = teams.filter(function(t){ return BYE_2026[t] < 5 || BYE_2026[t] > 18; });
      if (invalidWeeks.length) throw new Error('Invalid bye weeks for: '+invalidWeeks.join(', '));
      return '32 teams with valid bye weeks (weeks 5-18) ✓';
    }},
  {id:8, category:'ADP Data', name:'No duplicate bye weeks — max 4 teams per week',
    async: false,
    fn: function() {
      var weekCounts = {};
      Object.values(BYE_2026).forEach(function(w){ weekCounts[w] = (weekCounts[w]||0)+1; });
      var overloaded = Object.keys(weekCounts).filter(function(w){ return weekCounts[w] > 4; });
      if (overloaded.length) throw new Error('Weeks with >4 bye teams: '+overloaded.join(', '));
      return 'All bye weeks have 4 or fewer teams ✓';
    }},

  // TIER LOGIC TESTS
  {id:9, category:'Tier Logic', name:'QB tier breaks — groups of 4',
    async: false,
    fn: function() {
      var players = getMockPlayers('QB', 20);
      var tiered = assignTiers(players, 'QB');
      var tier1 = tiered.filter(function(p){ return p.tier===1; });
      var tier2 = tiered.filter(function(p){ return p.tier===2; });
      if (tier1.length !== 4) throw new Error('Tier 1 has '+tier1.length+' QBs, expected 4');
      if (tier2.length !== 4) throw new Error('Tier 2 has '+tier2.length+' QBs, expected 4');
      return 'QB Tier 1: '+tier1.length+' players, Tier 2: '+tier2.length+' players ✓';
    }},
  {id:10, category:'Tier Logic', name:'RB/WR tier breaks — groups of 8',
    async: false,
    fn: function() {
      var players = getMockPlayers('RB', 32);
      var tiered = assignTiers(players, 'RB');
      var tier1 = tiered.filter(function(p){ return p.tier===1; });
      if (tier1.length !== 8) throw new Error('Tier 1 has '+tier1.length+' RBs, expected 8');
      return 'RB Tier 1: '+tier1.length+' players ✓';
    }},
  {id:11, category:'Tier Logic', name:'TE tier breaks — groups of 5',
    async: false,
    fn: function() {
      var players = getMockPlayers('TE', 20);
      var tiered = assignTiers(players, 'TE');
      var tier1 = tiered.filter(function(p){ return p.tier===1; });
      if (tier1.length !== 5) throw new Error('Tier 1 has '+tier1.length+' TEs, expected 5');
      return 'TE Tier 1: '+tier1.length+' players ✓';
    }},
  {id:12, category:'Tier Logic', name:'Players sorted by ADP within tiers',
    async: false,
    fn: function() {
      var players = getMockPlayers('WR', 16);
      // Shuffle
      players.sort(function(){ return Math.random()-0.5; });
      var tiered = assignTiers(players, 'WR');
      var adps = tiered.map(function(p){ return p.adp; });
      var isSorted = adps.every(function(v,i){ return i===0 || v >= adps[i-1]; });
      if (!isSorted) throw new Error('Players not sorted by ADP after tier assignment');
      return 'All '+tiered.length+' WRs sorted by ADP correctly ✓';
    }},

  // STREAMABILITY TESTS
  {id:13, category:'Streamability', name:'Injured player (OUT) gets low stream score',
    async: false,
    fn: function() {
      var player = {name:'Test Player', team:'KC', injuryStatus:'OUT'};
      var score = getStreamScore(player);
      if (score >= 30) throw new Error('OUT player score: '+score+', expected < 30');
      return 'OUT player stream score: '+score+'/100 ✓';
    }},
  {id:14, category:'Streamability', name:'Healthy player with early bye gets high stream score',
    async: false,
    fn: function() {
      var player = {name:'Test Player', team:'MIA', injuryStatus:null}; // MIA bye week 6
      var score = getStreamScore(player);
      if (score < 60) throw new Error('Healthy player score: '+score+', expected >= 60');
      return 'Healthy early-bye player stream score: '+score+'/100 ✓';
    }},
  {id:15, category:'Streamability', name:'Stream score always between 0 and 100',
    async: false,
    fn: function() {
      var players = [
        {team:'KC', injuryStatus:'OUT'},
        {team:'MIA', injuryStatus:null},
        {team:'DAL', injuryStatus:'QUESTIONABLE'},
        {team:'PHI', injuryStatus:'IR'},
      ];
      var errors = [];
      players.forEach(function(p) {
        var s = getStreamScore(p);
        if (s < 0 || s > 100) errors.push(p.team+': '+s);
      });
      if (errors.length) throw new Error('Out of range: '+errors.join(', '));
      return 'All stream scores within 0-100 range ✓';
    }},

  // INJURY STATUS TESTS
  {id:16, category:'Injury Badges', name:'All 5 injury statuses recognized',
    async: false,
    fn: function() {
      var statuses = ['OUT','IR','DOUBTFUL','QUESTIONABLE','PUP'];
      var badges = {
        'OUT':       {label:'OUT',       color:'red'},
        'IR':        {label:'IR',        color:'red'},
        'DOUBTFUL':  {label:'DOUBTFUL',  color:'orange'},
        'QUESTIONABLE':{label:'Q',       color:'yellow'},
        'PUP':       {label:'PUP',       color:'red'}
      };
      var missing = statuses.filter(function(s){ return !badges[s]; });
      if (missing.length) throw new Error('Missing badge config for: '+missing.join(', '));
      return 'All 5 injury statuses have badge configs ✓';
    }},
  {id:17, category:'Injury Badges', name:'Healthy player has no injury badge',
    async: false,
    fn: function() {
      var player = {injuryStatus: null};
      var hasBadge = player.injuryStatus !== null && player.injuryStatus !== undefined;
      if (hasBadge) throw new Error('Healthy player showing injury badge');
      return 'Healthy player correctly shows no injury badge ✓';
    }},

  // DRAFT TRACKING TESTS
  {id:18, category:'Draft Tracking', name:'Drafted player list updates correctly',
    async: false,
    fn: function() {
      var drafted = [];
      function draftPlayer(name) { drafted.push(name); }
      function isDrafted(name) { return drafted.includes(name); }
      draftPlayer('Josh Allen');
      draftPlayer('CeeDee Lamb');
      if (!isDrafted('Josh Allen')) throw new Error('Josh Allen not in drafted list');
      if (!isDrafted('CeeDee Lamb')) throw new Error('CeeDee Lamb not in drafted list');
      if (isDrafted('Lamar Jackson')) throw new Error('Lamar Jackson should not be drafted');
      return drafted.length+' players drafted, tracking correct ✓';
    }},
  {id:19, category:'Draft Tracking', name:'Pick number increments correctly',
    async: false,
    fn: function() {
      var picks = [];
      for (var i = 0; i < 5; i++) {
        picks.push({pick: picks.length + 1, player: 'Player_'+(i+1)});
      }
      if (picks[4].pick !== 5) throw new Error('Pick 5 has number '+picks[4].pick);
      if (picks[0].pick !== 1) throw new Error('Pick 1 has number '+picks[0].pick);
      return '5 picks tracked correctly (#1 through #5) ✓';
    }},
  {id:20, category:'Draft Tracking', name:'Round calculation from pick number',
    async: false,
    fn: function() {
      var teamCount = 12;
      function getRound(pickNum) { return Math.ceil(pickNum / teamCount); }
      var tests = [{pick:1,round:1},{pick:12,round:1},{pick:13,round:2},{pick:24,round:2},{pick:120,round:10}];
      var errors = [];
      tests.forEach(function(t) {
        var r = getRound(t.pick);
        if (r !== t.round) errors.push('Pick '+t.pick+': got round '+r+', expected '+t.round);
      });
      if (errors.length) throw new Error(errors.join(', '));
      return 'Round calculation correct for all test cases ✓';
    }},

  // DATA FRESHNESS TESTS
  {id:21, category:'Data Freshness', name:'Season year set to 2026 in all references',
    async: false,
    fn: function() {
      var currentYear = new Date().getFullYear();
      if (currentYear !== 2026) {
        return 'Note: Current year is '+currentYear+' — verify season year in draft.html matches';
      }
      return 'Current year is 2026 — season data should be current ✓';
    }},
  {id:22, category:'Data Freshness', name:'Tank01 NFL API is reachable for live data',
    async: true,
    warn: true,
    fn: async function() {
      try {
        var res = await fetch('https://tank01-nfl-live-in-game-real-time-statistics-nfl.p.rapidapi.com/getNFLTeams', {
          headers: {
            'x-rapidapi-host': 'tank01-nfl-live-in-game-real-time-statistics-nfl.p.rapidapi.com',
            'x-rapidapi-key': 'YOUR_KEY_HERE'
          }
        });
        if (res.status === 401 || res.status === 403) {
          return 'Tank01 reachable (auth required — key stored in Netlify env) ✓';
        }
        if (!res.ok) throw new Error('HTTP '+res.status);
        return 'Tank01 NFL API reachable ✓';
      } catch(e) {
        if (e.message.includes('401') || e.message.includes('403')) {
          return 'Tank01 reachable (auth required — key stored in Netlify env) ✓';
        }
        throw new Error('Tank01 unreachable: '+e.message);
      }
    }},
  {id:23, category:'Data Freshness', name:'Sleeper API returns current season data',
    async: true,
    fn: async function() {
      var res = await fetch('https://api.sleeper.app/v1/state/nfl');
      if (!res.ok) throw new Error('HTTP '+res.status);
      var state = await res.json();
      var season = state.season;
      var week = state.week || state.display_week;
      return 'NFL state: Season '+season+', Week '+week+' ✓';
    }},

  // NAVIGATION & LINKS TESTS
  {id:24, category:'Navigation', name:'All draft page nav links are correctly formatted',
    async: false,
    fn: function() {
      var links = ['/', '/sanctum', '/auction'];
      var errors = [];
      links.forEach(function(l) {
        if (!l.startsWith('/')) errors.push(l+' does not start with /');
      });
      if (errors.length) throw new Error(errors.join(', '));
      return 'All '+links.length+' nav links correctly formatted ✓';
    }},
  {id:25, category:'Navigation', name:'Draft page accessible via Netlify',
    async: true,
    fn: async function() {
      var res = await fetch('/draft');
      if (!res.ok) throw new Error('Draft page returned HTTP '+res.status);
      var text = await res.text();
      if (!text.includes('Draft') && !text.includes('draft')) throw new Error('Draft page content not found');
      return 'Draft page loads successfully (HTTP '+res.status+') ✓';
    }},
];

// ═══════════════════════════════════════
// TEST RUNNER
// ═══════════════════════════════════════
var results = {};
TESTS.forEach(function(t) { results[t.id] = {status:'pending', detail:'', error:''}; });
var running = false;

async function runAllTests() {
  if (running) return;
  running = true;
  var btn = document.getElementById('run-btn');
  btn.textContent = '⏳ Running...';
  btn.disabled = true;
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('summary').style.display = 'none';
  TESTS.forEach(function(t) { results[t.id] = {status:'running', detail:'', error:''}; });
  renderList();

  for (var i = 0; i < TESTS.length; i++) {
    var test = TESTS[i];
    try {
      var detail;
      if (test.async) {
        detail = await test.fn();
      } else {
        detail = test.fn();
      }
      results[test.id] = {status:'pass', detail:detail, error:''};
    } catch(e) {
      results[test.id] = {status: test.warn ? 'warn' : 'fail', detail:'', error:e.message};
    }
    var pct = Math.round(((i+1)/TESTS.length)*100);
    document.getElementById('progress-fill').style.width = pct+'%';
    document.getElementById('progress-label').textContent = (i+1)+' / '+TESTS.length+' complete — '+pct+'%';
    updateStats();
    renderList();
    await new Promise(function(r){ setTimeout(r, 150); });
  }

  running = false;
  btn.textContent = '▶ Run All Tests';
  btn.disabled = false;
  showSummary();
}

function resetTests() {
  running = false;
  TESTS.forEach(function(t) { results[t.id] = {status:'pending', detail:'', error:''}; });
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('progress-fill').style.width = '0%';
  renderList();
  updateStats();
}

function updateStats() {
  var pass = TESTS.filter(function(t){ return results[t.id].status==='pass'; }).length;
  var warn = TESTS.filter(function(t){ return results[t.id].status==='warn'; }).length;
  var fail = TESTS.filter(function(t){ return results[t.id].status==='fail'; }).length;
  var total = pass + warn + fail;
  var pct = total ? Math.round(((pass+warn)/TESTS.length)*100) : 0;
  document.getElementById('stat-pass').textContent = pass;
  document.getElementById('stat-warn').textContent = warn;
  document.getElementById('stat-fail').textContent = fail;
  var scoreEl = document.getElementById('stat-score');
  scoreEl.textContent = total ? pct+'%' : '—';
  scoreEl.style.color = pct>=90?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
}

function showSummary() {
  var pass = TESTS.filter(function(t){ return results[t.id].status==='pass'; }).length;
  var warn = TESTS.filter(function(t){ return results[t.id].status==='warn'; }).length;
  var fail = TESTS.filter(function(t){ return results[t.id].status==='fail'; }).length;
  var pct = Math.round(((pass+warn)/TESTS.length)*100);
  var verdict = fail===0 && warn===0 ? '🎉 PERFECT — Draft Command Center ready!' :
                fail===0 ? '✅ LAUNCH READY — '+warn+' warnings to review (non-blocking)' :
                '⚠️ '+fail+' tests failing — fix before launch';
  document.getElementById('summary-grid').innerHTML =
    '<div class="summary-item"><strong>'+pass+'</strong>Passed</div>'+
    '<div class="summary-item"><strong>'+warn+'</strong>Warnings</div>'+
    '<div class="summary-item"><strong>'+fail+'</strong>Failed</div>'+
    '<div class="summary-item"><strong>'+verdict+'</strong>Verdict</div>';
  document.getElementById('summary').style.display = 'block';
}

function renderList() {
  var categories = [];
  TESTS.forEach(function(t){ if (!categories.includes(t.category)) categories.push(t.category); });
  var html = '';
  categories.forEach(function(cat) {
    var catTests = TESTS.filter(function(t){ return t.category===cat; });
    html += '<div class="section-header">'+cat+'</div>';
    catTests.forEach(function(test) {
      var r = results[test.id];
      var cardClass = r.status==='pass'?'pass':r.status==='fail'?'fail':r.status==='warn'?'warn':r.status==='running'?'running':'';
      var pillClass = r.status==='pass'?'pill-pass':r.status==='fail'?'pill-fail':r.status==='warn'?'pill-warn':r.status==='running'?'pill-running':'pill-pending';
      var pillLabel = r.status==='pass'?'Pass ✓':r.status==='fail'?'Fail ✗':r.status==='warn'?'Warn ⚠':r.status==='running'?'Running...':'Pending';
      var detailHtml = r.detail ? '<div class="test-detail success">'+r.detail+'</div>' : '';
      var errorHtml  = r.error  ? '<div class="test-detail '+(r.status==='warn'?'warning':'error')+'">'+r.error+'</div>' : '';
      html +=
        '<div class="test-card '+cardClass+'">'+
          '<div class="test-meta">'+
            '<span class="test-num">#'+test.id+'</span>'+
            '<span class="pill pill-cat">'+cat+'</span>'+
            '<span class="pill '+pillClass+'">'+pillLabel+'</span>'+
            (test.warn ? '<span class="pill pill-warn">Expected</span>' : '')+
          '</div>'+
          '<div class="test-name">'+test.name+'</div>'+
          detailHtml + errorHtml +
        '</div>';
    });
  });
  document.getElementById('results-list').innerHTML = html;
}

function exportReport() {
  var pass = TESTS.filter(function(t){ return results[t.id].status==='pass'; }).length;
  var warn = TESTS.filter(function(t){ return results[t.id].status==='warn'; }).length;
  var fail = TESTS.filter(function(t){ return results[t.id].status==='fail'; }).length;
  var report = '═══════════════════════════════════════\n';
  report += 'THE INNER SANCTUM — DRAFT COMMAND CENTER TEST REPORT\n';
  report += 'Generated: '+new Date().toLocaleString()+'\n';
  report += '═══════════════════════════════════════\n\n';
  report += 'SUMMARY: '+pass+' passed, '+warn+' warnings, '+fail+' failed ('+TESTS.length+' total)\n\n';
  TESTS.forEach(function(t) {
    var r = results[t.id];
    var s = r.status==='pass'?'PASS':r.status==='warn'?'WARN':r.status==='fail'?'FAIL':'PENDING';
    report += '['+s+'] #'+t.id+' ['+t.category+'] '+t.name+'\n';
    if (r.detail) report += '  Result: '+r.detail+'\n';
    if (r.error)  report += '  Note: '+r.error+'\n';
    report += '\n';
  });
  var blob = new Blob([report], {type:'text/plain'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'InnerSanctum_DraftTests_'+new Date().toISOString().slice(0,10)+'.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

renderList();
updateStats();
</script>
</body>
</html>
